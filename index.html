<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Voxel</title>
<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
background: radial-gradient(ellipse at center, #2a201c 0%, #0a0807 100%);
display: flex;
align-items: center;
justify-content: center;
}
#canvas-container {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
opacity: 1;
}
#loader {
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 60px;
height: 60px;
perspective: 200px;
z-index: 100;
transition: opacity 1.2s ease-out 0.5s;
}
#loader.hidden { opacity: 0; pointer-events: none; }
#loader-cube {
width: 100%;
height: 100%;
position: relative;
transform-style: preserve-3d;
animation: rotateCube 1.2s infinite ease-in-out;
}
#loader-cube div {
position: absolute;
width: 60px;
height: 60px;
background: linear-gradient(135deg, #D97757 0%, #c56a4d 100%);
border: 2px solid rgba(217, 119, 87, 0.3);
box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
}
#loader-cube .front  { transform: translateZ(30px); }
#loader-cube .back   { transform: rotateY(180deg) translateZ(30px); }
#loader-cube .left   { transform: rotateY(-90deg) translateZ(30px); }
#loader-cube .right  { transform: rotateY(90deg) translateZ(30px); }
#loader-cube .top    { transform: rotateX(90deg) translateZ(30px); }
#loader-cube .bottom { transform: rotateX(-90deg) translateZ(30px); }
@keyframes rotateCube {
0% { transform: rotateX(0deg) rotateY(0deg) scale(0.8); }
50% { transform: rotateX(180deg) rotateY(180deg) scale(1); }
100% { transform: rotateX(360deg) rotateY(360deg) scale(0.8); }
}
</style>
</head>
<body>
<div id="loader">
<div id="loader-cube">
<div class="front"></div>
<div class="back"></div>
<div class="left"></div>
<div class="right"></div>
<div class="top"></div>
<div class="bottom"></div>
</div>
</div>
<div id="canvas-container"></div>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const canvasContainer = document.getElementById('canvas-container');
const loader = document.getElementById('loader');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 0, 42);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
canvasContainer.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
new THREE.Vector2(window.innerWidth, window.innerHeight),
0.85, 0.4, 0.85
);
bloomPass.threshold = 0.15;
bloomPass.strength = 1.3;
bloomPass.radius = 0.5;
composer.addPass(bloomPass);

const keyLight = new THREE.DirectionalLight(0xffffff, 2.8);
keyLight.position.set(15, 25, 20);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 150;
keyLight.shadow.camera.left = -50;
keyLight.shadow.camera.right = 50;
keyLight.shadow.camera.top = 50;
keyLight.shadow.camera.bottom = -50;
keyLight.shadow.bias = -0.0001;
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0xffedd0, 2.2);
rimLight.position.set(-20, -10, -15);
scene.add(rimLight);

const fillLight = new THREE.DirectionalLight(0xd4a574, 1.0);
fillLight.position.set(-10, 5, 25);
scene.add(fillLight);

const ambientLight = new THREE.AmbientLight(0x403028, 0.6);
scene.add(ambientLight);

function renderSVGToCanvas() {
const canvas = document.createElement('canvas');
canvas.width = 80;
canvas.height = 80;
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, 80, 80);
ctx.fillStyle = '#fff';
const path = new Path2D('M19.6 66.5 l 19.7 -11 l 0.3 -1 l -0.3 -0.5 h -1 l -3.3 -0.2 l -11.2 -0.3 L14 53 l -9.5 -0.5 l -2.4 -0.5 L0 49 l 0.2 -1.5 l 2 -1.3 l 2.9 0.2 l 6.3 0.5 l 9.5 0.6 l 6.9 0.4 L38 49.1 h 1.6 l 0.2 -0.7 l -0.5 -0.4 l -0.4 -0.4 L29 41 l -10.6 -7 l -5.6 -4.1 l -3 -2 l -1.5 -2 l -0.6 -4.2 l 2.7 -3 l 3.7 0.3 l 0.9 0.2 l 3.7 2.9 l 8 6.1 L37 36 l 1.5 1.2 l 0.6 -0.4 l 0.1 -0.3 l -0.7 -1.1 L33 25 l -6 -10.4 l -2.7 -4.3 l -0.7 -2.6 c -0.3 -1 -0.4 -2 -0.4 -3 l 3 -4.2 L28 0 l 4.2 0.6 L33.8 2 l 2.6 6 l 4.1 9.3 L47 29.9 l 2 3.8 l 1 3.4 l 0.3 1 h 0.7 v -0.5 l 0.5 -7.2 l 1 -8.7 l 1 -11.2 l 0.3 -3.2 l 1.6 -3.8 l 3 -2 L61 2.6 l 2 2.9 l -0.3 1.8 l -1.1 7.7 L59 27.1 l -1.5 8.2 h 0.9 l 1 -1.1 l 4.1 -5.4 l 6.9 -8.6 l 3 -3.5 L77 13 l 2.3 -1.8 h 4.3 l 3.1 4.7 l -1.4 4.9 l -4.4 5.6 l -3.7 4.7 l -5.3 7.1 l -3.2 5.7 l 0.3 0.4 h 0.7 l 12 -2.6 l 6.4 -1.1 l 7.6 -1.3 l 3.5 1.6 l 0.4 1.6 l -1.4 3.4 l -8.2 2 l -9.6 2 l -14.3 3.3 l -0.2 0.1 l 0.2 0.3 l 6.4 0.6 l 2.8 0.2 h 6.8 l 12.6 1 l 3.3 2 l 1.9 2.7 l -0.3 2 l -5.1 2.6 l -6.8 -1.6 l -16 -3.8 l -5.4 -1.3 h -0.8 v 0.4 l 4.6 4.5 l 8.3 7.5 L89 80.1 l 0.5 2.4 l -1.3 2 l -1.4 -0.2 l -9.2 -7 l -3.6 -3 l -8 -6.8 h -0.5 v 0.7 l 1.8 2.7 l 9.8 14.7 l 0.5 4.5 l -0.7 1.4 l -2.6 1 l -2.7 -0.6 l -5.8 -8 l -6 -9 l -4.7 -8.2 l -0.5 0.4 l -2.9 30.2 l -1.3 1.5 l -3 1.2 l -2.5 -2 l -1.4 -3 l 1.4 -6.2 l 1.6 -8 l 1.3 -6.4 l 1.2 -7.9 l 0.7 -2.6 v -0.2 H49 L43 72 l -9 12.3 l -7.2 7.6 l -1.7 0.7 l -3 -1.5 l 0.3 -2.8 L24 86 l 10 -12.8 l 6 -7.9 l 4 -4.6 l -0.1 -0.5 h -0.3 L17.2 77.4 l -4.7 0.6 l -2 -2 l 0.2 -3 l 1 -1 l 8 -5.5 Z');
ctx.save();
ctx.translate(-5, 5);
ctx.scale(0.7, 0.7);
ctx.fill(path);
ctx.restore();
return canvas;
}

function computeSDF(canvas) {
const ctx = canvas.getContext('2d');
const imageData = ctx.getImageData(0, 0, 80, 80);
const data = imageData.data;
const size = 80;
const INF = 1e9;
const sdf = new Float32Array(size * size);
const f = new Float32Array(size);
const d = new Float32Array(size);
const z = new Float32Array(size + 1);
const v = new Int32Array(size);

for (let y = 0; y < size; y++) {
for (let x = 0; x < size; x++) {
const idx = (y * size + x) * 4;
f[x] = data[idx] > 128 ? 0 : INF;
}
dt1D(f, d, z, v, size);
for (let x = 0; x < size; x++) {
sdf[y * size + x] = d[x];
}
}

for (let x = 0; x < size; x++) {
for (let y = 0; y < size; y++) {
f[y] = sdf[y * size + x];
}
dt1D(f, d, z, v, size);
for (let y = 0; y < size; y++) {
sdf[y * size + x] = Math.sqrt(d[y]);
}
}

for (let i = 0; i < size * size; i++) {
const idx = i * 4;
if (data[idx] < 128) {
sdf[i] = -sdf[i];
}
}
return sdf;
}

function dt1D(f, d, z, v, n) {
let k = 0;
v[0] = 0;
z[0] = -1e9;
z[1] = 1e9;
for (let q = 1; q < n; q++) {
let s;
do {
const p = v[k];
s = ((f[q] + q * q) - (f[p] + p * p)) / (2 * q - 2 * p);
if (s <= z[k]) k--;
else break;
} while (k >= 0);
k++;
v[k] = q;
z[k] = s;
z[k + 1] = 1e9;
}
k = 0;
for (let q = 0; q < n; q++) {
while (z[k + 1] < q) k++;
d[q] = (q - v[k]) * (q - v[k]) + f[v[k]];
}
}

function generateVoxels(sdf) {
const voxels = [];
const size = 80;
const spacing = 0.1375;

for (let y = 0; y < size; y++) {
for (let x = 0; x < size; x++) {
const dist = sdf[y * size + x];
if (dist > 0) {
const depth = Math.min(dist * 0.3, 2.5);
const layers = Math.max(1, Math.ceil(depth));
for (let z = 0; z < layers; z++) {
const isSurface = z === 0 || z === layers - 1 || 
x === 0 || x === size - 1 || 
(x > 0 && sdf[y * size + (x - 1)] <= 0) || 
(x < size - 1 && sdf[y * size + (x + 1)] <= 0) ||
y === 0 || y === size - 1 || 
(y > 0 && sdf[(y - 1) * size + x] <= 0) || 
(y < size - 1 && sdf[(y + 1) * size + x] <= 0);

if (isSurface) {
const centerX = (x - size / 2) * spacing;
const centerY = -(y - size / 2) * spacing;
const centerZ = (z - layers / 2) * spacing * 1.5;
const distFromCenter = Math.sqrt((x - size/2) ** 2 + (y - size/2) ** 2);
const ao = Math.min(1.0, 0.4 + dist / 8.0);

voxels.push({
x: centerX, y: centerY, z: centerZ,
ao: ao,
delay: distFromCenter * 0.012
});
}
}
}
}
}
return voxels;
}

const svgCanvas = renderSVGToCanvas();
const sdf = computeSDF(svgCanvas);
const voxels = generateVoxels(sdf);

const voxelGeometry = new THREE.BoxGeometry(0.125, 0.125, 0.125);
const voxelMaterial = new THREE.MeshStandardMaterial({
color: 0xD97757,
metalness: 0.15,
roughness: 0.45,
envMapIntensity: 1.0
});

const instancedMesh = new THREE.InstancedMesh(voxelGeometry, voxelMaterial, voxels.length);
instancedMesh.castShadow = true;
instancedMesh.receiveShadow = true;

const dummy = new THREE.Object3D();
const targetPositions = new Float32Array(voxels.length * 3);
const randomPositions = new Float32Array(voxels.length * 3);
const delays = new Float32Array(voxels.length);
const aoValues = new Float32Array(voxels.length);

voxels.forEach((voxel, i) => {
const angle = Math.random() * Math.PI * 2;
const radius = 80 + Math.random() * 50;
const phi = Math.acos(2 * Math.random() - 1);

randomPositions[i * 3 + 0] = radius * Math.sin(phi) * Math.cos(angle);
randomPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(angle);
randomPositions[i * 3 + 2] = radius * Math.cos(phi);

targetPositions[i * 3 + 0] = voxel.x;
targetPositions[i * 3 + 1] = voxel.y;
targetPositions[i * 3 + 2] = voxel.z;

delays[i] = voxel.delay;
aoValues[i] = voxel.ao;

dummy.position.set(
randomPositions[i * 3],
randomPositions[i * 3 + 1],
randomPositions[i * 3 + 2]
);
dummy.updateMatrix();
instancedMesh.setMatrixAt(i, dummy.matrix);
});

voxelGeometry.setAttribute('targetPos', new THREE.InstancedBufferAttribute(targetPositions, 3));
voxelGeometry.setAttribute('randomPos', new THREE.InstancedBufferAttribute(randomPositions, 3));
voxelGeometry.setAttribute('delay', new THREE.InstancedBufferAttribute(delays, 1));
voxelGeometry.setAttribute('ao', new THREE.InstancedBufferAttribute(aoValues, 1));

voxelMaterial.onBeforeCompile = (shader) => {
shader.uniforms.uTime = { value: 0 };
shader.uniforms.uProgress = { value: 0 };

const vertexHeader = `
uniform float uTime;
uniform float uProgress;
attribute vec3 targetPos;
attribute vec3 randomPos;
attribute float delay;
attribute float ao;
varying float vAO;
varying vec3 vPosition;

float easeOutElastic(float t) {
float c4 = (2.0 * 3.14159265359) / 3.0;
return t == 0.0 ? 0.0 : t >= 1.0 ? 1.0 : pow(2.0, -10.0 * t) * sin((t * 10.0 - 0.75) * c4) + 1.0;
}

vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

float snoise(vec3 v) {
const vec2 C = vec2(1.0/6.0, 1.0/3.0);
const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
vec3 i = floor(v + dot(v, C.yyy));
vec3 x0 = v - i + dot(i, C.xxx);
vec3 g = step(x0.yzx, x0.xyz);
vec3 l = 1.0 - g;
vec3 i1 = min(g.xyz, l.zxy);
vec3 i2 = max(g.xyz, l.zxy);
vec3 x1 = x0 - i1 + C.xxx;
vec3 x2 = x0 - i2 + C.yyy;
vec3 x3 = x0 - D.yyy;
i = mod289(i);
vec4 p = permute(permute(permute(
i.z + vec4(0.0, i1.z, i2.z, 1.0))
+ i.y + vec4(0.0, i1.y, i2.y, 1.0))
+ i.x + vec4(0.0, i1.x, i2.x, 1.0));
float n_ = 0.142857142857;
vec3 ns = n_ * D.wyz - D.xzx;
vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
vec4 x_ = floor(j * ns.z);
vec4 y_ = floor(j - 7.0 * x_);
vec4 x = x_ *ns.x + ns.yyyy;
vec4 y = y_ *ns.x + ns.yyyy;
vec4 h = 1.0 - abs(x) - abs(y);
vec4 b0 = vec4(x.xy, y.xy);
vec4 b1 = vec4(x.zw, y.zw);
vec4 s0 = floor(b0)*2.0 + 1.0;
vec4 s1 = floor(b1)*2.0 + 1.0;
vec4 sh = -step(h, vec4(0.0));
vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
vec3 p0 = vec3(a0.xy, h.x);
vec3 p1 = vec3(a0.zw, h.y);
vec3 p2 = vec3(a1.xy, h.z);
vec3 p3 = vec3(a1.zw, h.w);
vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
m = m * m;
return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}
`;

shader.vertexShader = vertexHeader + shader.vertexShader;

shader.vertexShader = shader.vertexShader.replace(
'#include <begin_vertex>',
`
#include <begin_vertex>
vAO = ao;
float t = clamp(uProgress - delay, 0.0, 1.0);
float eased = easeOutElastic(t);
vec3 basePos = mix(randomPos, targetPos, eased);

if (uProgress >= 1.0) {
float noiseScale = 1.2;
float noiseTime = uTime * 0.25;
float n = snoise(vec3(basePos.x * noiseScale, basePos.y * noiseScale, noiseTime));
basePos.y += n * 0.04;
basePos.z += n * 0.03;
}

transformed += basePos;
vPosition = transformed;
`
);

const fragmentHeader = `
uniform float uTime;
varying float vAO;
varying vec3 vPosition;
`;

shader.fragmentShader = fragmentHeader + shader.fragmentShader;

shader.fragmentShader = shader.fragmentShader.replace(
'vec4 diffuseColor = vec4( diffuse, opacity );',
`
float scan = sin(vPosition.x * 0.08 + uTime * 0.8) * 0.5 + 0.5;
scan = pow(scan, 15.0);
vec3 aoColor = diffuse * vAO;
vec3 scanColor = vec3(1.0, 0.7, 0.4) * scan * 0.35;
vec4 diffuseColor = vec4(aoColor + scanColor, opacity);
`
);

voxelMaterial.userData.shader = shader;
};

scene.add(instancedMesh);

const startTime = Date.now();
const initialPauseDuration = 3000;
const transitionDuration = 4000;
let loaderHidden = false;

function animate() {
requestAnimationFrame(animate);
const elapsed = Date.now() - startTime;

let progress = 0;
if (elapsed > initialPauseDuration) {
progress = Math.min((elapsed - initialPauseDuration) / transitionDuration, 1.0);
}

if (voxelMaterial.userData.shader) {
voxelMaterial.userData.shader.uniforms.uTime.value = elapsed * 0.001;
voxelMaterial.userData.shader.uniforms.uProgress.value = progress;
}

if (elapsed > 500 && !loaderHidden) {
loaderHidden = true;
loader.classList.add('hidden');
}

const cameraAngle = elapsed * 0.00015;
const cameraRadius = 42;
camera.position.x = Math.sin(cameraAngle) * cameraRadius;
camera.position.z = Math.cos(cameraAngle) * cameraRadius;
camera.position.y = Math.sin(elapsed * 0.0004) * 2.5;
camera.lookAt(0, -0.5, 0);

composer.render();
}

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
composer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
